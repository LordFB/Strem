<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strem - Stream Unlimited</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header" id="header">
        <div class="header-left">
            <a href="/" class="logo">STREM</a>
            <nav class="nav-desktop">
                <a href="#" data-section="home">Home</a>
                <a href="#" data-section="movies">Movies</a>
                <a href="#" data-section="tv">TV Shows</a>
                <a href="#" data-section="fresh">Fresh</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Titles, people, genres..." autocomplete="off">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <div class="mobile-nav" id="mobileNav">
        <a href="#" data-section="home">Home</a>
        <a href="#" data-section="movies">Movies</a>
        <a href="#" data-section="tv">TV Shows</a>
        <a href="#" data-section="fresh">Fresh</a>
    </div>

    <main class="main">
        <section class="hero" id="hero">
            <div class="hero-bg" id="heroBg"></div>
            <div class="hero-vignette"></div>
            <div class="hero-content">
                <span class="hero-meta" id="heroMeta"></span>
                <h1 class="hero-title" id="heroTitle"></h1>
                <p class="hero-desc" id="heroDesc"></p>
                <div class="hero-actions">
                    <button class="btn btn-primary" id="heroPlay">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        Play
                    </button>
                    <button class="btn btn-secondary" id="heroInfo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                        More Info
                    </button>
                </div>
            </div>
        </section>

        <section class="content-rows" id="contentRows">
            <!-- Rows injected by JS -->
        </section>

        <section class="search-results hidden" id="searchResults">
            <h2 class="section-title">Search Results</h2>
            <div class="grid" id="searchGrid"></div>
        </section>
    </main>

    <footer class="footer">
        <p>Strem is a demo project. Content metadata from TMDB. Playback via vidsrc-embed.ru.</p>
    </footer>

    <!-- TV Detail Page -->
    <div class="detail-page hidden" id="detailPage">
        <div class="detail-page-backdrop" id="detailPageBackdrop"></div>
        <button class="detail-close" id="detailClose" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div class="detail-content" id="detailContent"></div>
    </div>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-backdrop" id="modalBackdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <div class="modal-player" id="modalPlayer"></div>
            <div class="modal-info" id="modalInfo"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- TV Mode indicator -->
    <div class="tv-indicator">Remote mode</div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/player.js"></script>
    <script src="js/remote.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
